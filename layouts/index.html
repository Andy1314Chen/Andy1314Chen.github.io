{{ define "main" }}
    {{ $paginator := .Site.RegularPages.ByDate.Reverse | first 100 }}

    <div class="content">
        <main class="posts">
                    {{ range $paginator.GroupByDate "2006" }}
                <div class="posts-group">
                    <div class="post-year">{{ .Key }}</div>
                    <ul class="posts-list">
                        {{ range .Pages }}
                            <li class="post-item">
                                <a href="{{ .Permalink }}" class="post-item-inner">
                                    <span class="post-title">{{ .Title }}</span>
                                    <span class="post-day">
                                        {{ time.Format "Jan 2" .Date }}
                                    </span>
                                </a>
                            </li>
                        {{ end }}
                    </ul>
                </div>
            {{ end }}
        </main>
    </div>
{{ end }}
